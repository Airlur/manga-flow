<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漫译 MangaFlow</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #fff;
      color: #333;
    }

    .popup {
      padding: 16px;
    }

    /* 语言选择区域 */
    .lang-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .lang-box {
      flex: 1;
    }

    .lang-select-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      padding: 8px 12px;
      background: #f5f5f5;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .lang-select-wrapper:hover {
      background: #ebebeb;
    }

    .lang-select-wrapper select {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      padding-right: 20px;
    }

    .lang-select-wrapper select:focus {
      outline: none;
    }

    .lang-select-wrapper::after {
      content: '▼';
      position: absolute;
      right: 12px;
      font-size: 10px;
      color: #999;
      pointer-events: none;
    }

    .lang-label {
      font-size: 11px;
      color: #999;
      margin-top: 6px;
      padding-left: 4px;
    }

    .lang-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #999;
      padding: 0 4px;
      margin-top: -20px;
    }

    /* 翻译服务区域 - 改为下拉框 */
    .service-section {
      margin-bottom: 16px;
    }

    .service-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
      display: block;
    }

    .service-select-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      padding: 10px 12px;
      background: #f5f5f5;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .service-select-wrapper:hover {
      background: #ebebeb;
    }

    .service-select-wrapper select {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      padding-right: 20px;
    }

    .service-select-wrapper select:focus {
      outline: none;
    }

    .service-select-wrapper::after {
      content: '▼';
      position: absolute;
      right: 12px;
      font-size: 10px;
      color: #999;
      pointer-events: none;
    }

    /* 翻译按钮 */
    .translate-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #333 0%, #555 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
    }

    .translate-btn:hover {
      background: linear-gradient(135deg, #444 0%, #666 100%);
      transform: translateY(-1px);
    }

    .translate-btn:active {
      transform: translateY(0);
    }

    .action-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .secondary-btn {
      flex: 1;
      padding: 11px 12px;
      background: #fff;
      color: #333;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .secondary-btn:hover {
      background: #fafafa;
      border-color: #d4d4d8;
    }

    /* 设置入口 */
    .settings-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px;
      color: #666;
      font-size: 13px;
      cursor: pointer;
      transition: color 0.2s;
      background: none;
      border: none;
    }

    .settings-link:hover {
      color: #333;
    }

    /* 提示信息 */
    .tip {
      padding: 12px;
      background: #fff8e6;
      border-radius: 8px;
      font-size: 12px;
      color: #b58105;
      margin-bottom: 16px;
      display: none;
      line-height: 1.5;
    }

    .tip.show {
      display: block;
    }

    /* 分割线 */
    .divider {
      height: 1px;
      background: #f0f0f0;
      margin: 8px 0;
    }

    /* 状态信息 */
    .status {
      padding: 8px 12px;
      background: #e8f5e9;
      border-radius: 6px;
      font-size: 12px;
      color: #2e7d32;
      margin-bottom: 12px;
      display: none;
    }

    .status.show {
      display: block;
    }

    .status.error {
      background: #ffebee;
      color: #c62828;
    }
  </style>
</head>
<body>
  <div class="popup">
    <!-- 语言选择 -->
    <div class="lang-section">
      <div class="lang-box">
        <div class="lang-select-wrapper">
          <select id="source-lang">
            <option value="auto">自动检测</option>
            <option value="ko">韩语</option>
            <option value="ja">日语</option>
            <option value="en">英语</option>
          </select>
        </div>
        <div class="lang-label">原文语言</div>
      </div>
      <span class="lang-arrow">→</span>
      <div class="lang-box">
        <div class="lang-select-wrapper">
          <select id="target-lang">
            <option value="zh">简体中文</option>
          </select>
        </div>
        <div class="lang-label">目标语言</div>
      </div>
    </div>

    <!-- 翻译服务 - 真正的下拉框 -->
    <div class="service-section">
      <span class="service-label">翻译服务</span>
      <div class="service-select-wrapper">
        <select id="translate-engine">
          <option value="microsoft">微软翻译（免费）</option>
          <option value="google">Google 翻译（免费）</option>
          <option value="openai">OpenAI 兼容 API</option>
          <option value="deeplx">DeepLX</option>
          <option value="deepl">DeepL</option>
        </select>
      </div>
    </div>

    <!-- 状态 -->
    <div class="status" id="status"></div>

    <!-- 提示 -->
    <div class="tip" id="tip"></div>

    <!-- 翻译按钮 -->
      <button class="translate-btn" id="translate-btn">开始翻译</button>

      <div class="action-row">
        <button class="secondary-btn" id="restore-ball-btn">重新显示悬浮球</button>
      </div>

    <!-- 分割线 -->
    <div class="divider"></div>

    <!-- 底部操作栏 -->
    <div class="footer-actions" style="display: flex; justify-content: space-between; align-items: center; padding: 0 4px;">
      <button id="settings-link" class="settings-link" type="button">更多设置</button>
      <button id="clear-cache-btn" style="background: none; border: none; color: #999; cursor: pointer; font-size: 12px; padding: 4px 8px;">清除缓存</button>
    </div>
  </div>

  <script src="../../dist/popup/popup.js"></script>
</body>
</html>
